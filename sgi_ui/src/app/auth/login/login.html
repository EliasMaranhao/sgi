<div fxLayout="row" fxLayoutAlign="center" class="login-container">
    <div fxLayout="column" fxFlex="1000px">
        <mat-card class="login-card">
            <mat-card-header>
                <mat-card-title>
                    Acessar minha conta
                </mat-card-title>
            </mat-card-header>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <mat-card-content>
                    <!--Email-->
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>E-mail</mat-label>
                        <input matInput type="text" 
                               formControlName="login" 
                               name="login"
                               placeholder="example@email.com"/>
                        <mat-icon matSuffix>email</mat-icon>
                        <mat-error>Insira um email válido</mat-error>
                    </mat-form-field>

                    <!--Senha-->
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Senha</mat-label>
                        <input matInput [type]="hide ? 'password' : 'text'"
                               name="senha" 
                               formControlName="senha"/>
                        <button mat-icon-button matSuffix (click)="hide = !hide" type="button">
                            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                        </button>
                        <mat-error>Senha é obrigatória (mínimo 8 caracteres)</mat-error>
                    </mat-form-field>
                </mat-card-content>

                <mat-card-footer>
                    <a mat-button color="accent">Esqueci minha senha</a>
                </mat-card-footer>

                <mat-card-actions>
                    <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="!loginForm.valid || isLoading">
                        @if (!isLoading) {
                            <span>Entrar</span>
                        }
                        
                        @if (isLoading) {
                            <mat-spinner diameter="20"></mat-spinner>
                        }
                    </button>
                </mat-card-actions>
                @if (errorMessage) { <p style="color: red">{{ errorMessage }}</p> }
            </form>
        </mat-card>
    </div>
</div>
