<mat-toolbar color="primary" class="header-toolbar mat-elevation-z6">
    
    <div class="logo-container" routerLink="/dashboard" style="cursor: pointer;">
        <img src="/adbonsucesso.jpg" alt="SGI Logo" class="logo-img">
        <span class="logo-text">AD Bonsucesso</span>
    </div>

    @if (unidadeAtual) {    
        <div class="unidade-context">
            <mat-icon>location_city</mat-icon>
            <span class="unidade-nome">{{ unidadeAtual.nome }}</span>
            <span class="unidade-badge">{{ unidadeAtual.identificador }}</span>
        </div>
    }

    <span class="spacer"></span>

    <div class="nav-items">

        @for (item of menuItens; track item.titulo) {
            <button mat-button [matMenuTriggerFor]="dynamicMenu" [matTooltip]="item.tooltip">
                <mat-icon>{{ item.icone }}</mat-icon>
                {{ item.titulo }}
                <mat-icon>expand_more</mat-icon>
            </button>

            <mat-menu #dynamicMenu="matMenu">
                @for (sub of item.submenus; track sub.label) {
                    <button mat-menu-item [routerLink]="sub.rota">
                        @if (sub.icone) {
                            <mat-icon>{{ sub.icone }}</mat-icon>
                        }
                        <span>{{ sub.label }}</span>
                    </button>
                }
            </mat-menu>
        }

        <button mat-icon-button (click)="logout()" title="Sair">
            <mat-icon>logout</mat-icon>
        </button>
    </div>
</mat-toolbar>

<main class="main-container">
  <router-outlet></router-outlet>
</main>
