<div fxLayout="row" fxLayoutAlign="center" class="mt-20">
    <div fxLayout="column" fxFlex="1000px">
        <mat-toolbar class="mat-elevation-z1" style="border-radius: 4px;">
            <span class="spacer"></span>
            <div fxLayout="row" fxLayoutGap="15px">
                <a mat-icon-button color="accent" routerLink="/matriz" routerLinkActive="active-link" matTooltip="Matriz">
                    <mat-icon matListItemIcon>domain</mat-icon>
                    <span matListItemTitle></span>
                </a>

                <a mat-icon-button color="primary" routerLink="/filial" routerLinkActive="active-link" matTooltip="Consultar filial">
                    <mat-icon matListItemIcon>search</mat-icon>
                    <span matListItemTitle></span>
                </a>

                <a mat-icon-button color="accent" routerLink="/filial/cadastro" routerLinkActive="active-link" matTooltip="Cadastrar nova filial">
                    <mat-icon matListItemIcon>add_circle</mat-icon>
                    <span matListItemTitle></span>
                </a>
            </div>
        </mat-toolbar>
    </div>
</div>
