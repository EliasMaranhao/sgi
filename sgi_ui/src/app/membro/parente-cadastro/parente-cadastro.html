<div fxLayout="row" fxLayoutAlign="center">
  <div fxLayout="column" fxFlex="750px">
    <form>
      <mat-card class="mt-20">
        <mat-card-header>
            <mat-card-title>Parentes</mat-card-title>
        </mat-card-header>

        <mat-card-content>
          
            <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px" class="mt-20">
              <div fxLayout="column" fxFlex="500px">
                  <mat-form-field appearance="outline" class="full-width">
                      <mat-label>Nome: *</mat-label>
                      <input type="text" placeholder="Ex: José da Silva" 
                                        matInput
                                        name="nome"/>
                      <mat-icon matSuffix>person</mat-icon>
                  </mat-form-field>
              </div>
              <div fxLayout="column" fxFlex="200px">
                  <mat-form-field appearance="outline">
                      <mat-label>Tipo</mat-label>
                      <mat-icon matSuffix>category</mat-icon>
                      
                      <mat-select>
                          <mat-option value="celular">PAI</mat-option>
                          <mat-option value="fixo">MÃE</mat-option>
                          <mat-option value="trabalho">IRMÃ</mat-option>
                          <mat-option value="trabalho">IRMÃO</mat-option>
                          <mat-option value="trabalho">PRIMO</mat-option>
                          <mat-option value="trabalho">PRIMA</mat-option>
                          <mat-option value="trabalho">AVÔ</mat-option>
                          <mat-option value="trabalho">AVÓ</mat-option>
                          <mat-option value="trabalho">TIO</mat-option>
                          <mat-option value="trabalho">TIA</mat-option>
                      </mat-select>
                  </mat-form-field>
              </div>
            </div>
          
        </mat-card-content>
      </mat-card>

      <!--
      <mat-card-actions>
        <div fxLayout="row" fxLayoutAlign="start">
            <button mat-button (click)="close()">Cancelar</button>
            <button mat-flat-button color="primary" [mat-dialog-close]="true">Salvar</button>
        </div>
      </mat-card-actions>
      -->
    </form>
  </div>
</div>

<div fxLayout="row" fxLayoutAlign="center" class="mt-10">
  <div fxLayout="column" fxFlex="750px">

    <mat-card>
      <!--
      <mat-card-header>
        <mat-card-title>Parentes</mat-card-title>
      </mat-card-header>
      -->
      <mat-card-content>
        <table mat-table [dataSource]="dataSource">

          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef> Parente </th>
            <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
          </ng-container>

          <ng-container matColumnDef="parentesco">
            <th mat-header-cell *matHeaderCellDef> Parentesco </th>
            <td mat-cell *matCellDef="let element"> {{element.parentesco}} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </mat-card-content>
    </mat-card>

  </div>
</div>
