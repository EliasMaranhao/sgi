jwt.public.key=classpath:certs/publicKey.pem
jwt.private.key=classpath:certs/privateKey.pem

spring.application.name=sgi

#spring.sql.init.mode=always

spring.datasource.url=jdbc:mysql://localhost/sgi?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties..hibernate.format_sql=true

spring.jackson.deserialization.fail-on-unknown-properties=true

logging.level.org.springframework.security=trace