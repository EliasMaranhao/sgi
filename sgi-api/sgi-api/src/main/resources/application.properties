spring.application.name=sgi-api

# Dados de conexão (substitua pelo seu banco e senha)
spring.datasource.url=jdbc:mysql://localhost:3306/sgi?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configurações do Hibernate / JPA
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.security.token.secret=${JWT_SECRET:minha-chave-secreta-ultra-segura-123}
